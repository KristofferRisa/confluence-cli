version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/confluence
    binary: confluence
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kristofferrisa/confluence-cli/internal/commands.Version={{.Version}}
      - -X github.com/kristofferrisa/confluence-cli/internal/commands.GitCommit={{.FullCommit}}
      - -X github.com/kristofferrisa/confluence-cli/internal/commands.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: kristofferrisa
    name: confluence-cli
  draft: false
  prerelease: auto
